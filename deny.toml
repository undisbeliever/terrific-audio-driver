# cargo-deny configuration

[licenses]
version = 2

confidence-threshold = 0.93

allow = [
    "MIT",
    "ISC",
    "Zlib",
    "Apache-2.0",
    "Unicode-3.0",
]


[bans]
multiple-versions = "deny"
wildcards = "deny"

deny = []

skip = [
    # Ignore duplicate entries for crate errors
    { name="bitflags", version = "1.3", reason = "used by cpal v0.16" },

    # Ignore duplicate entries for crate errors
    #
    # From the JNI crate used for cpal android support
    { name="windows-sys", version = "0.45.0", reason = "from cpal jni dependency" },
    { name="windows-targets", version = "0.42.2", reason = "from cpal jni dependency" },
    { name="windows_aarch64_gnullvm", version = "0.42.2", reason = "from cpal jni dependency" },
    { name="windows_aarch64_msvc", version = "0.42.2", reason = "from cpal jni dependency" },
    { name="windows_i686_gnu", version = "0.42.2", reason = "from cpal jni dependency" },
    { name="windows_i686_msvc", version = "0.42.2", reason = "from cpal jni dependency" },
    { name="windows_x86_64_gnu", version = "0.42.2", reason = "from cpal jni dependency" },
    { name="windows_x86_64_gnullvm", version = "0.42.2", reason = "from cpal jni dependency" },
    { name="windows_x86_64_msvc", version = "0.42.2", reason = "from cpal jni dependency" },
]

[advisories]
version = 2
yanked = "deny"


[sources]
unknown-registry = "deny"
unknown-git = "deny"


